# Cấu hình khử nhiễu phím
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# Cấu hình enconder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Cấu hình công suất phát BLE
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Khắc phục lỗi báo cáo pin trên Windows
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Cấu hình màn hình OLED
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Cấu hình quản lý năng lượng
CONFIG_ZMK_IDLE_TIMEOUT=150000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Cấu hình đánh thức
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_USB=y

# Cấu hình ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# Cấu hình đèn nền RGB
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Tự động tắt RGB khi idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# === CẤU HÌNH BLE ỔN ĐỊNH CHO INTEL (ĐÃ LOẠI BỎ XUNG ĐỘT) ===

# Tăng buffer BLE
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_BUF_ACL_TX_SIZE=512
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_TX_BUFFER_SIZE=512

# Tối ưu connection parameters
CONFIG_BT_CTLR_CONNECTION_RX_ACK_TIMEOUT=500
CONFIG_BT_L2CAP_TX_BUF_COUNT=6

# Tăng timeout
CONFIG_BT_GATT_TIMEOUT=3000

# Cấu hình controller
CONFIG_BT_MAX_CONN=5
CONFIG_BT_CTLR_SCHED_ADVANCED=y
CONFIG_BT_CTLR_ADVANCED_FEATURES=y

# Giảm quảng bá
CONFIG_BT_EXT_ADV_MAX_ADV_SET=1

# THỬ BẬT DÒNG NÀY SAU - CÓ THỂ GÂY LỖI NÊN COMMENT TRƯỚC
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# === KẾT THÚC ===

# Tối ưu hóa log
CONFIG_ZMK_USB_LOGGING=n

# Không xóa bond khi khởi động
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
